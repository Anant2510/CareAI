<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{font-family:'Inter',sans-serif;background:#F4F5F7;overflow-x:hidden;color:#111827}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:translateX(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes flowDash{to{stroke-dashoffset:-12}}
.fu{animation:fadeUp .55s cubic-bezier(.22,1,.36,1) both}
.si{animation:slideIn .5s cubic-bezier(.22,1,.36,1) both}
.hover-lift{transition:transform .22s,box-shadow .22s}
.hover-lift:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.10),0 2px 6px rgba(0,0,0,.05)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:#D1D5DB;border-radius:6px}
</style>

function ArchDiagram({ active, setActive }) {
  const W=1000, H=320, nodeW=108, nodeH=76, gap=8;
  const totalW=PIPELINE.length*nodeW+(PIPELINE.length-1)*gap;
  const startX=(W-totalW)/2;
  const nodeY=55;
  const kpiY=nodeY+nodeH+38;
  const nx=i=>startX+i*(nodeW+gap);

  return (
    <section className="fu" style={{ animationDelay:".15s", margin:"24px 24px 0", background:X.card, borderRadius:18, border:"1px solid "+X.bdr, boxShadow:X.sh, padding:"28px 32px 20px" }}>

        <div>
          <div style={{ fontSize:16, fontWeight:800, color:X.t1, marginBottom:6 }}>Architecture — How Agents Connect</div>
          <div style={{ fontSize:12, color:X.t3 }}>Click any stage to explore what each agent does</div>
        </div>
        {active!==null && <button onClick={()=>setActive(null)} style={{ fontSize:11, color:X.t3, background:"none", border:"1px solid "+X.bdr, borderRadius:8, padding:"4px 12px", cursor:"pointer" }}>Clear selection ×</button>}
      </div>

      <svg viewBox={"0 0 "+W+" "+H} style={{ width:"100%", display:"block" }}>
        <text x={W/2} y="20" textAnchor="middle" fontSize="8" fontWeight="800" fill={X.t1} letterSpacing=".08em" fontFamily="Inter">CAREAI PIPELINE — 8 AUTONOMOUS AGENTS</text>
        {PIPELINE.slice(0,-1).map((_,i)=>{
          const x1=nx(i)+nodeW, x2=nx(i+1), cy=nodeY+nodeH/2;
          return <g key={"line"+i}><line x1={x1} y1={cy} x2={x2} y2={cy} stroke={X.bdr2} strokeWidth="1.5" strokeDasharray="4 3" style={{ animation:"flowDash 1s linear infinite" }}/><polygon points={(x2-2)+","+(cy-4)+" "+(x2+4)+","+cy+" "+(x2-2)+","+(cy+4)} fill={X.bdr2}/></g>;
        })}
        {PIPELINE.map((p,i)=>{
          const x=nx(i), isAct=active===i;
          return (
            <g key={p.id} onClick={()=>setActive(isAct?null:i)} style={{ cursor:"pointer" }}>
              <rect x={x} y={nodeY} width={nodeW} height={nodeH} rx={12} fill={isAct?p.bg:X.surf} stroke={isAct?p.color:X.bdr} strokeWidth={isAct?2:1}/>
              {isAct && <rect x={x-2} y={nodeY-2} width={nodeW+4} height={nodeH+4} rx={14} fill="none" stroke={p.color} strokeWidth="1" opacity=".3"/>}
              <text x={x+nodeW/2} y={nodeY+22} textAnchor="middle" fontSize="15">{p.icon}</text>
              {p.label.split("\n").map((ln,li)=><text key={li} x={x+nodeW/2} y={nodeY+38+li*11} textAnchor="middle" fontSize="7.5" fontWeight="700" fill={X.t2} fontFamily="Inter">{ln}</text>)}
            </g>
          );
        })}
        {PIPELINE.map((p,i)=>{
          const cx=nx(i)+nodeW/2;
          return <g key={"kpi"+i}><line x1={cx} y1={nodeY+nodeH} x2={cx} y2={kpiY-6} stroke={X.bdr} strokeWidth="1" strokeDasharray="2 2"/><text x={cx} y={kpiY+4} textAnchor="middle" fontSize="6" fontWeight="600" fill={X.t3} fontFamily="Inter">{p.kpi}</text></g>;
        })}
        <rect x="60" y={H-58} width={W-120} height="50" rx="10" fill={X.surf} stroke={X.bdr} strokeWidth="1"/>
        <text x={W/2} y={H-42} textAnchor="middle" fontSize="7" fontWeight="700" fill={X.t3} letterSpacing=".1em" fontFamily="Inter">ACTIVATION CHANNELS</text>
        {CHANNELS.map((ch,i)=>{
          const chW=(W-160)/CHANNELS.length;
          const cx=80+i*chW+chW/2;
          return <g key={i}><text x={cx} y={H-22} textAnchor="middle" fontSize="12">{ch.icon}</text><text x={cx} y={H-11} textAnchor="middle" fontSize="5.5" fill={X.t2} fontFamily="Inter">{ch.name}</text></g>;
        })}
      </svg>

      {active!==null && (
        <div className="fu" style={{ marginTop:16, padding:"20px 24px", background:PIPELINE[active].bg, borderRadius:14, border:"1px solid "+PIPELINE[active].color+"22", display:"flex", gap:20, alignItems:"flex-start" }}>
          <div style={{ fontSize:32 }}>{PIPELINE[active].icon}</div>
          <div style={{ flex:1 }}>
            <div style={{ fontSize:15, fontWeight:700, color:X.t1, marginBottom:6 }}>{PIPELINE[active].agent}</div>
            <div style={{ fontSize:12, color:X.t2, lineHeight:1.6, marginBottom:10 }}>{PIPELINE[active].desc}</div>
            <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
              <Badge text={"Differentiator: "+PIPELINE[active].diff} color={PIPELINE[active].color}/>
              <Badge text={"KPI: "+PIPELINE[active].kpi} color={X.t1} bg={X.t1+"0a"}/>
            </div>
          </div>
        </div>
      )}
    </section>
  );
}
