@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(232,176,56,.35)}50%{box-shadow:0 0 0 8px rgba(232,176,56,0)}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes flowDash{to{stroke-dashoffset:-12}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes scaleIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}

// ── SVG Architecture Diagram ──
function ArchDiagram({selected, onSelect}){
  const W=1000, H=290, nodeW=108, nodeH=76, gap=8;
  const totalW = PIPELINE.length*nodeW + (PIPELINE.length-1)*gap;
  const startX = (W-totalW)/2;
  const Y=60;

  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto",display:"block"}}>
      {/* Title */}
      <text x={W/2} y={28} textAnchor="middle" style={{fontSize:9,fontWeight:700,fill:X.t3,letterSpacing:"0.15em",fontFamily:"Inter"}}>
        ASSURE.AI PIPELINE — {PIPELINE.length} AUTONOMOUS AGENTS
      </text>

      {/* Connecting lines */}
      {PIPELINE.slice(0,-1).map((_,i)=>{
        const x1=startX+i*(nodeW+gap)+nodeW;
        const x2=startX+(i+1)*(nodeW+gap);
        const cy=Y+nodeH/2;
        return <line key={i} x1={x1} y1={cy} x2={x2} y2={cy} stroke={X.bdr} strokeWidth={1.5} strokeDasharray="4 3" style={{animation:"flowDash 1s linear infinite"}}/>;
      })}

      {/* Arrow markers */}
      <defs>
        <marker id="arrow" viewBox="0 0 6 6" refX={5} refY={3} markerWidth={5} markerHeight={5} orient="auto-start-reverse">
          <path d="M0,0 L6,3 L0,6 z" fill={X.t3}/>
        </marker>
      </defs>

      {PIPELINE.slice(0,-1).map((_,i)=>{
        const x1=startX+i*(nodeW+gap)+nodeW+2;
        const x2=startX+(i+1)*(nodeW+gap)-2;
        const cy=Y+nodeH/2;
        return <line key={`a${i}`} x1={x1} y1={cy} x2={x2} y2={cy} stroke="transparent" strokeWidth={1} markerEnd="url(#arrow)"/>;
      })}

      {/* Nodes */}
      {PIPELINE.map((p,i)=>{
        const nx=startX+i*(nodeW+gap);
        const isActive=selected===p.id;
        return (
          <g key={p.id} onClick={()=>onSelect(isActive?null:p.id)} style={{cursor:"pointer"}}>
            <rect x={nx} y={Y} width={nodeW} height={nodeH} rx={12} ry={12}
              fill={isActive?p.bg:X.card}
              stroke={isActive?p.color:X.bdr}
              strokeWidth={isActive?2.5:1}
              style={{filter:isActive?`drop-shadow(0 0 8px ${p.color}44)`:undefined,transition:"all .2s"}}
            />
            <text x={nx+nodeW/2} y={Y+24} textAnchor="middle" style={{fontSize:14}}>{p.icon}</text>
            {p.label.split("\n").map((line,li)=>(
              <text key={li} x={nx+nodeW/2} y={Y+40+li*11} textAnchor="middle"
                style={{fontSize:7.5,fontWeight:600,fill:isActive?p.color:X.t1,fontFamily:"Inter"}}>{line}</text>
            ))}
          </g>
        );
      })}

      {/* KPI labels below nodes */}
      {PIPELINE.map((p,i)=>{
        const nx=startX+i*(nodeW+gap);
        const cy=Y+nodeH;
        return (
          <g key={`k${i}`}>
            <line x1={nx+nodeW/2} y1={cy+4} x2={nx+nodeW/2} y2={cy+18} stroke={p.color} strokeWidth={1} strokeDasharray="2 2"/>
            <text x={nx+nodeW/2} y={cy+30} textAnchor="middle" style={{fontSize:6,fontWeight:600,fill:p.color,fontFamily:"Inter"}}>{p.kpi}</text>
          </g>
        );
      })}

      {/* Activation bar */}
      <rect x={40} y={H-50} width={W-80} height={36} rx={10} fill={X.surf} stroke={X.bdr} strokeWidth={1}/>
      <text x={W/2} y={H-38} textAnchor="middle" style={{fontSize:6.5,fontWeight:700,fill:X.t3,letterSpacing:".12em",fontFamily:"Inter"}}>ACTIVATION CHANNELS</text>
      {CHANNELS.map((ch,i)=>{
        const cx=80+i*((W-160)/CHANNELS.length)+((W-160)/CHANNELS.length)/2;
        return (
          <g key={ch.name}>
            <text x={cx} y={H-20} textAnchor="middle" style={{fontSize:10}}>{ch.icon}</text>
            <text x={cx} y={H-10} textAnchor="middle" style={{fontSize:5.5,fontWeight:500,fill:X.t2,fontFamily:"Inter"}}>{ch.name}</text>
          </g>
        );
      })}
    </svg>
  );
}

function DemoRunner({useCase, onBack}){
  const uc=USE_CASES.find(u=>u.id===useCase);
  const [currentStep,setCurrentStep]=useState(-1);
  const [stepStates,setStepStates]=useState(uc.steps.map(()=>"pending"));
  const [phase,setPhase]=useState("running");
  const [demoTab,setDemoTab]=useState("agent");
  const running=useRef(false);

  useEffect(()=>{
    if(running.current) return;
    running.current=true;
    (async()=>{
      for(let i=0;i<uc.steps.length;i++){
        setCurrentStep(i);
        setStepStates(prev=>{const n=[...prev];n[i]="running";return n;});
        await new Promise(r=>setTimeout(r,800+Math.random()*500));
        setStepStates(prev=>{const n=[...prev];n[i]="done";return n;});
      }
      setPhase("done");
      setDemoTab("experience");
    })();
  },[]);

  const progress=stepStates.filter(s=>s==="done").length/uc.steps.length*100;

  return (
    <div className="fi">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:24}}>{uc.icon}</span>
          <span style={{fontSize:18,fontWeight:700,color:X.t1}}>{uc.title}</span>
          {phase==="done"&&<Badge text="✓ Complete" color={X.green} bg={X.greenB}/>}
        </div>
        <button onClick={onBack} style={{padding:"6px 16px",background:X.surf,border:`1px solid ${X.bdr}`,borderRadius:8,fontSize:12,fontWeight:500,color:X.t2,cursor:"pointer"}}>← Back to Use Cases</button>
      </div>

      {/* Progress bar */}
      <div style={{height:4,background:X.bdr,borderRadius:2,marginBottom:20,overflow:"hidden"}}>
        <div style={{height:"100%",width:`${progress}%`,background:uc.color,borderRadius:2,transition:"width .4s ease"}}/>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"340px 1fr",gap:20}}>
        {/* Left panel */}
        <div style={{display:"flex",flexDirection:"column",gap:16}}>
          {/* Trigger */}
          <div style={{padding:"16px",background:X.coralB,borderRadius:12,border:`1px solid ${X.coral}20`}}>
            <div style={{fontSize:11,fontWeight:700,color:X.coral,marginBottom:8}}>⚡ {uc.trigger.title}</div>
            {uc.trigger.signals.map((sig,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                <span style={{fontSize:8,fontWeight:700,padding:"1px 6px",borderRadius:6,
                  background:sig.sev==="critical"?"#FEE2E2":sig.sev==="high"?"#FEF3C7":"#E0E7FF",
                  color:sig.sev==="critical"?"#DC2626":sig.sev==="high"?"#D97706":"#4F46E5"
                }}>{sig.sev.toUpperCase()}</span>
                <span style={{fontSize:10,color:X.t2}}><strong>{sig.s}:</strong> {sig.e}</span>
              </div>
            ))}
          </div>

          {/* Policyholder */}
          <div style={{padding:"16px",background:X.surf,borderRadius:12,border:`1px solid ${X.bdr}`}}>
            <div style={{fontSize:11,fontWeight:700,color:X.t1,marginBottom:8}}>👤 Policyholder Profile</div>
            <div style={{fontFamily:mono,fontSize:10.5,lineHeight:1.9,color:X.t2}}>
              {Object.entries(uc.policyholder).map(([k,v])=>(
                <div key={k}><span style={{fontWeight:600,color:uc.color}}>{k}:</span> {v}</div>
              ))}
            </div>
          </div>

          {/* Execution log */}
          <div style={{padding:"16px",background:X.surf,borderRadius:12,border:`1px solid ${X.bdr}`,maxHeight:260,overflowY:"auto"}}>

              const p=PIPELINE[i];
              const state=stepStates[i];
              return (
                <div key={i} className={state!=="pending"?"si":""} style={{display:"flex",gap:8,alignItems:"flex-start",marginBottom:8,opacity:state==="pending"?.35:1,transition:"opacity .3s",animationDelay:`${i*.05}s`}}>
                  <span style={{fontSize:12,width:18,textAlign:"center",flexShrink:0}}>
                    {state==="running"?<span style={{display:"inline-block",animation:"spin 1s linear infinite"}}>⚙️</span>:state==="done"?"✅":"⬜"}
                  </span>
                  <div>
                    <div style={{fontSize:10,fontWeight:600,color:p.color}}>{p.agent}</div>
                    <div style={{fontSize:9.5,color:X.t3}}>{step.t}</div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Right panel - tabs */}
        <div>
          <div style={{display:"flex",gap:4,marginBottom:16}}>
            {[{k:"agent",l:"🤖 Agent Flow"},{k:"experience",l:"📱 Experience"},{k:"data",l:"📊 Data"}].map(tab=>(
              <button key={tab.k} onClick={()=>setDemoTab(tab.k)} style={{

              }}>{tab.l}</button>
            ))}
          </div>

          <div style={{background:X.surf,borderRadius:14,padding:"20px",border:`1px solid ${X.bdr}`,minHeight:400}}>
            {demoTab==="agent"&&(
              <div className="fi">
                {PIPELINE.map((p,i)=>(
                  <div key={p.id} className="si" style={{display:"flex",alignItems:"center",gap:12,marginBottom:14,animationDelay:`${i*.06}s`}}>

                    <div style={{flex:1}}>
                      <div style={{fontSize:12,fontWeight:700,color:X.t1}}>{p.agent}</div>
                      <Badge text={p.diff} color={p.color}/>

                    <span style={{fontSize:12}}>
                      {stepStates[i]==="done"?"✅":stepStates[i]==="running"?<span style={{display:"inline-block",animation:"spin 1s linear infinite"}}>⚙️</span>:"⬜"}
                    </span>
                  </div>
                ))}
              </div>
            )}

            {demoTab==="experience"&&(
              <div className="sci" style={{maxWidth:360,margin:"0 auto"}}>
                {phase==="done"?(
                  <div>
                    {/* Push notification mock */}
                    <div style={{background:X.card,borderRadius:14,padding:"16px",boxShadow:X.shH,marginBottom:16,border:`1px solid ${X.bdr}`}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                        <div style={{width:28,height:28,borderRadius:7,background:`linear-gradient(135deg,${X.gold},${X.goldDark})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>🛡️</div>
                        <div>
                          <div style={{fontSize:10,fontWeight:700,color:X.t1}}>ASSURE.AI</div>
                          <div style={{fontSize:9,color:X.t3}}>just now</div>
                        </div>
                      </div>
                      <div style={{fontSize:12,fontWeight:600,color:X.t1,marginBottom:4}}>{uc.offer.headline}</div>
                      <div style={{fontSize:11,color:X.t2}}>{uc.offer.action}</div>
                    </div>
                    {/* Offer card */}
                    <div style={{background:`linear-gradient(135deg,${uc.color}08,${uc.color}18)`,borderRadius:14,padding:"20px",border:`1.5px solid ${uc.color}30`}}>
                      <div style={{fontSize:14,fontWeight:700,color:X.t1,marginBottom:8}}>{uc.offer.headline}</div>
                      <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
                        <Badge text={`${uc.offer.discount} Discount`} color={uc.color}/>
                        <Badge text={uc.offer.addon} color={X.green}/>
                        <Badge text={uc.offer.channel} color={X.purple}/>
                      </div>
                      <div style={{fontFamily:mono,fontSize:11,color:X.t2,marginBottom:14}}>{uc.offer.action}</div>
                      <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:16}}>
                        <div style={{textAlign:"center"}}>
                          <div style={{fontSize:9,color:X.t3,marginBottom:2}}>Before</div>
                          <div style={{fontFamily:mono,fontSize:18,fontWeight:700,color:X.t3}}>{uc.result.before}</div>
                        </div>
                        <div style={{fontSize:18}}>→</div>
                        <div style={{textAlign:"center"}}>
                          <div style={{fontSize:9,color:uc.color,marginBottom:2}}>After</div>
                          <div style={{fontFamily:mono,fontSize:18,fontWeight:700,color:uc.color}}>{uc.result.after}</div>
                        </div>
                        <div style={{fontSize:10,color:X.t3}}>{uc.result.metric}</div>
                      </div>
                      <ClaimButton color={uc.color}/>
                    </div>
                  </div>
                ):(
                  <div style={{textAlign:"center",padding:"60px 20px",color:X.t3}}>
                    <div style={{fontSize:36,marginBottom:12,animation:"spin 2s linear infinite"}}>⚙️</div>
                    <div style={{fontSize:13,fontWeight:500}}>Pipeline executing...</div>
                    <div style={{fontSize:11}}>Experience will appear when complete</div>
                  </div>
                )}
              </div>
            )}

            {demoTab==="data"&&(
              <div className="fi" style={{display:"flex",flexDirection:"column",gap:14}}>
                {uc.steps.map((step,i)=>{
                  const p=PIPELINE[i];
                  if(stepStates[i]!=="done") return null;
                  return (
                    <div key={i} className="si" style={{animationDelay:`${i*.06}s`}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
                        <span style={{fontSize:12}}>{p.icon}</span>
                        <span style={{fontSize:11,fontWeight:700,color:p.color}}>{p.agent}</span>
                      </div>
                      <DataBlock entries={step.d} color={p.color}/>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

function ClaimButton({color}){
  const [claimed,setClaimed]=useState(false);
  return claimed?(
    <div style={{textAlign:"center",padding:"10px",background:X.greenB,borderRadius:10,border:`1px solid ${X.green}30`}}>
      <span style={{fontSize:13,fontWeight:600,color:X.green}}>✅ Offer Claimed Successfully</span>
    </div>
  ):(
    <button onClick={()=>setClaimed(true)} style={{width:"100%",padding:"12px",background:color,color:"#fff",border:"none",borderRadius:10,fontSize:13,fontWeight:700,cursor:"pointer",transition:"opacity .2s"}}
      onMouseOver={e=>e.target.style.opacity=0.85} onMouseOut={e=>e.target.style.opacity=1}>
      Claim Offer →
    </button>
  );
}
